<div class="container mt-5">
   <h2 class="text-warning">{{titulo}}</h2>
   <ul class="list-group w-50 mx-auto">
      @for(producto of productos; track producto) {
         <li class="list-group-item text-center">{{producto.descripcion}}, ${{producto.precio}}</li>
      }
   </ul>

   <h5 class="text-success mt-3">Agregar Nuevo Producto</h5>

   <form class="d-flex justify-content-between align-items-center my-4 w-50 mx-auto">
      <input type="text" name="descripcion" id="descripcion" class="form-control me-2 w-75" placeholder="Descripción" autocomplete="off" [(ngModel)]="descripcionInput">
      <input type="number" name="precio" id="precio" class="form-control me-2 w-25" placeholder="Precio" autocomplete="off" [(ngModel)]="precioInput">
      <button type="submit" class="btn btn-primary" (click)="agregarProducto()">Agregar</button>
   </form>
</div>
