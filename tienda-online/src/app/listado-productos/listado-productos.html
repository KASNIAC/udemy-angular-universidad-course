<div class="container mt-5">
   <h2 class="text-warning">{{titulo}}</h2>
   <ul class="list-group w-50 mx-auto">
      @for(productoElemento of productos; track productoElemento) {
         <app-producto [producto]="productoElemento"></app-producto>
      }
   </ul>


   <app-formulario-producto (productoAgregado)="agregarProducto($event)"></app-formulario-producto>
</div>
